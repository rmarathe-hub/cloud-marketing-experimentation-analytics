[pytest]
testpaths = tests
pythonpath = scripts
markers =
    unit: Fast isolated unit tests
    integration: Multi-module integration tests
    network: Tests that require network access
    slow: Tests that read full local datasets
    data: Tests that require local raw/processed data files
    docs: Documentation consistency tests
    smoke: End-to-end smoke pipeline tests
    hygiene: Git and repository hygiene tests
    cleaning: Data cleaning pipeline tests
    profiling: Raw data profiling tests
    aws: Real AWS integration tests (skipped by default)
    week1: Week 1 foundation lock and integration tests
    week2: Week 2 analytics lock and integration tests
    duckdb: DuckDB schema, load, and validation tests
    s3: S3 upload workflow tests
    security: Secret protection and credential safety tests
    week1: Week 1 foundation lock and integration tests
    week2: Week 2 analytics lock and integration tests
    exports: Dashboard CSV and Tableau manifest export tests
    excel: Excel workbook export contract tests
    recommendations: Recommendations generator and doc tests
    forecast: CTR forecasting mart and summary tests
    abtest: A/B test analysis mart and summary tests
    tableau: Tableau dashboard screenshot and guide tests
addopts = -m "not network and not aws"
